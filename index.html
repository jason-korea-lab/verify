<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>비밀번호 생성기</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="card">
      <header class="card__header">
        <p class="badge">Password Generator</p>
        <h1>비밀번호 생성기</h1>
        <p class="subtitle">
          문자 조합과 길이를 선택한 뒤 비밀번호를 생성하세요.
        </p>
      </header>

      <section class="controls" aria-label="비밀번호 생성 옵션">
        <div class="field">
          <label for="charsetSelect">문자 조합</label>
          <select id="charsetSelect">
            <option value="">문자열 선택</option>
            <option value="number">숫자</option>
            <option value="lower">영어 소문자</option>
            <option value="upper">영어 대문자</option>
            <option value="special">특수문자</option>
            <option value="number_lower">숫자 + 영어 소문자</option>
            <option value="number_upper">숫자 + 영어 대문자</option>
            <option value="number_special">숫자 + 특수문자</option>
            <option value="lower_upper">영어 소문자 + 영어 대문자</option>
            <option value="lower_special">영어 소문자 + 특수문자</option>
            <option value="upper_special">영어 대문자 + 특수문자</option>
            <option value="number_lower_upper">숫자 + 영어 소문자 + 영어 대문자</option>
            <option value="number_lower_special">숫자 + 영어 소문자 + 특수문자</option>
            <option value="number_upper_special">숫자 + 영어 대문자 + 특수문자</option>
            <option value="lower_upper_special">영어 소문자 + 영어 대문자 + 특수문자</option>
            <option value="all">숫자 + 영어 소문자 + 영어 대문자 + 특수문자</option>
          </select>
        </div>

        <div class="field field--small">
          <label for="lengthSelect">길이</label>
          <select id="lengthSelect">
            <option value="">길이 선택</option>
          </select>
        </div>

        <div class="field field--button">
          <label class="label-placeholder">생성</label>
          <button id="generateBtn" class="btn btn--primary" type="button">
            생성하기
          </button>
        </div>
      </section>

      <section class="result" aria-label="생성 결과">
        <div class="result__top">
          <label for="passwordOutput">생성된 비밀번호</label>
          <button id="copyBtn" class="btn btn--secondary" type="button">
            복사하기
          </button>
        </div>

        <div class="output-wrap">
          <input
            id="passwordOutput"
            type="text"
            placeholder="여기에 생성된 비밀번호가 표시됩니다"
            readonly
          />
        </div>

        <p class="helper-text">
          여러 문자 조합을 선택한 옵션의 경우 각 문자군이 최소 1개 이상 포함되도록 생성됩니다.
        </p>
      </section>
    </section>
  </main>

  <div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal__box">
      <h2 id="modalTitle">알림</h2>
      <p id="modalMessage">문자열을 선택해 주세요</p>
      <button id="modalClose" class="btn btn--dark" type="button">확인</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
