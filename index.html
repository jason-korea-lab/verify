<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>비밀번호 생성기</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 820px;
      background: rgba(15, 23, 42, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .description {
      margin: 0 0 24px;
      color: #cbd5e1;
      font-size: 15px;
      line-height: 1.7;
    }

    .control-row {
      display: grid;
      grid-template-columns: 1.8fr 1fr auto;
      gap: 12px;
      align-items: center;
      margin-bottom: 24px;
    }

    select,
    button,
    input {
      border: none;
      outline: none;
      border-radius: 14px;
      font-size: 15px;
    }

    select {
      height: 52px;
      padding: 0 16px;
      background: #f8fafc;
      color: #0f172a;
      cursor: pointer;
    }

    .generate-btn {
      height: 52px;
      padding: 0 22px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      white-space: nowrap;
    }

    .generate-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(34, 197, 94, 0.28);
    }

    .result-area {
      margin-top: 6px;
    }

    .result-label {
      display: block;
      margin-bottom: 10px;
      color: #e2e8f0;
      font-size: 14px;
      font-weight: 600;
    }

    .result-box {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
    }

    #passwordOutput {
      height: 56px;
      padding: 0 16px;
      background: #e2e8f0;
      color: #0f172a;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .copy-btn {
      height: 56px;
      padding: 0 18px;
      background: #3b82f6;
      color: white;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .copy-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(59, 130, 246, 0.28);
    }

    .note {
      margin-top: 12px;
      color: #94a3b8;
      font-size: 13px;
      line-height: 1.6;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, 0.68);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 999;
    }

    .modal.hidden {
      display: none;
    }

    .modal-content {
      width: 100%;
      max-width: 360px;
      background: white;
      color: #0f172a;
      border-radius: 18px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      animation: popIn 0.2s ease;
    }

    .modal-title {
      margin: 0 0 10px;
      font-size: 22px;
      font-weight: 800;
    }

    .modal-message {
      margin: 0 0 18px;
      color: #475569;
      font-size: 15px;
      line-height: 1.6;
    }

    .modal-close {
      width: 100%;
      height: 46px;
      background: #0f172a;
      color: white;
      font-weight: 700;
      cursor: pointer;
      border-radius: 12px;
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.96);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @media (max-width: 700px) {
      .container {
        padding: 24px;
      }

      .control-row {
        grid-template-columns: 1fr;
      }

      .result-box {
        grid-template-columns: 1fr;
      }

      .generate-btn,
      .copy-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>비밀번호 생성기</h1>
    <p class="description">
      문자 조합과 길이를 선택한 뒤 <strong>생성하기</strong> 버튼을 누르면 비밀번호가 생성됩니다.
    </p>

    <div class="control-row">
      <select id="charsetSelect">
        <option value="">문자 조합 선택</option>
        <option value="number">숫자</option>
        <option value="lower">영어 소문자</option>
        <option value="upper">영어 대문자</option>
        <option value="special">특수문자</option>
        <option value="number_lower">숫자 + 영어 소문자</option>
        <option value="number_upper">숫자 + 영어 대문자</option>
        <option value="number_special">숫자 + 특수문자</option>
        <option value="lower_upper">영어 소문자 + 영어 대문자</option>
        <option value="lower_special">영어 소문자 + 특수문자</option>
        <option value="upper_special">영어 대문자 + 특수문자</option>
        <option value="number_lower_upper">숫자 + 영어 소문자 + 영어 대문자</option>
        <option value="number_lower_special">숫자 + 영어 소문자 + 특수문자</option>
        <option value="number_upper_special">숫자 + 영어 대문자 + 특수문자</option>
        <option value="lower_upper_special">영어 소문자 + 영어 대문자 + 특수문자</option>
        <option value="all">숫자 + 영어 소문자 + 영어 대문자 + 특수문자</option>
      </select>

      <select id="lengthSelect">
        <option value="">길이 선택</option>
      </select>

      <button class="generate-btn" id="generateBtn">생성하기</button>
    </div>

    <div class="result-area">
      <label class="result-label" for="passwordOutput">생성된 비밀번호</label>
      <div class="result-box">
        <input
          type="text"
          id="passwordOutput"
          placeholder="여기에 비밀번호가 생성됩니다"
          readonly
        />
        <button class="copy-btn" id="copyBtn">복사하기</button>
      </div>
      <p class="note">
        선택한 문자 조합이 여러 종류일 경우, 각 종류의 문자가 최소 1개 이상 포함되도록 생성됩니다.
      </p>
    </div>
  </div>

  <div class="modal hidden" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-content">
      <h2 class="modal-title" id="modalTitle">알림</h2>
      <p class="modal-message" id="modalMessage">문자열을 선택해 주세요</p>
      <button class="modal-close" id="modalClose">확인</button>
    </div>
  </div>

  <script>
    const lengthSelect = document.getElementById("lengthSelect");
    const charsetSelect = document.getElementById("charsetSelect");
    const generateBtn = document.getElementById("generateBtn");
    const passwordOutput = document.getElementById("passwordOutput");
    const copyBtn = document.getElementById("copyBtn");

    const modal = document.getElementById("modal");
    const modalMessage = document.getElementById("modalMessage");
    const modalClose = document.getElementById("modalClose");

    for (let i = 4; i <= 20; i++) {
      const option = document.createElement("option");
      option.value = i;
      option.textContent = `${i}자리`;
      lengthSelect.appendChild(option);
    }

    const charGroups = {
      number: "0123456789",
      lower: "abcdefghijklmnopqrstuvwxyz",
      upper: "ABCDEFGHIJKLMNOPQRSTUVWXYZ",
      special: "!@#$%^&*()_+-=[]{}|;:,.<>?/~`"
    };

    const combinationMap = {
      number: ["number"],
      lower: ["lower"],
      upper: ["upper"],
      special: ["special"],
      number_lower: ["number", "lower"],
      number_upper: ["number", "upper"],
      number_special: ["number", "special"],
      lower_upper: ["lower", "upper"],
      lower_special: ["lower", "special"],
      upper_special: ["upper", "special"],
      number_lower_upper: ["number", "lower", "upper"],
      number_lower_special: ["number", "lower", "special"],
      number_upper_special: ["number", "upper", "special"],
      lower_upper_special: ["lower", "upper", "special"],
      all: ["number", "lower", "upper", "special"]
    };

    function showModal(message) {
      modalMessage.textContent = message;
      modal.classList.remove("hidden");
    }

    function hideModal() {
      modal.classList.add("hidden");
    }

    function getSecureRandomInt(max) {
      if (max <= 0) return 0;
      const array = new Uint32Array(1);
      window.crypto.getRandomValues(array);
      return array[0] % max;
    }

    function getRandomChar(chars) {
      return chars[getSecureRandomInt(chars.length)];
    }

    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = getSecureRandomInt(i + 1);
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function generatePassword(groupKeys, length) {
      const result = [];

      // 선택된 각 문자 그룹에서 최소 1개씩 포함
      groupKeys.forEach((key) => {
        result.push(getRandomChar(charGroups[key]));
      });

      // 전체 사용 가능한 문자 풀
      const fullPool = groupKeys.map((key) => charGroups[key]).join("");

      while (result.length < length) {
        result.push(getRandomChar(fullPool));
      }

      return shuffleArray(result).join("");
    }

    generateBtn.addEventListener("click", () => {
      const charsetValue = charsetSelect.value;
      const lengthValue = lengthSelect.value;

      if (!charsetValue || !lengthValue) {
        showModal("문자열을 선택해 주세요");
        return;
      }

      const selectedGroups = combinationMap[charsetValue];
      const passwordLength = Number(lengthValue);

      if (!selectedGroups || passwordLength < selectedGroups.length) {
        showModal("문자열을 선택해 주세요");
        return;
      }

      const password = generatePassword(selectedGroups, passwordLength);
      passwordOutput.value = password;
    });

    copyBtn.addEventListener("click", async () => {
      if (!passwordOutput.value) {
        showModal("먼저 비밀번호를 생성해 주세요");
        return;
      }

      try {
        await navigator.clipboard.writeText(passwordOutput.value);
        showModal("비밀번호가 복사되었습니다");
      } catch (error) {
        showModal("복사에 실패했습니다");
      }
    });

    modalClose.addEventListener("click", hideModal);

    modal.addEventListener("click", (e) => {
      if (e.target === modal) {
        hideModal();
      }
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && !modal.classList.contains("hidden")) {
        hideModal();
      }
    });
  </script>
</body>
</html>
